<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Точечная очистка PDF</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 500px; margin: 60px auto; padding: 20px; line-height: 1.6; background: #f4f6f9; }
        .card { background: white; padding: 35px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        h1 { margin-top: 0; color: #222; font-size: 22px; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        .file-upload { border: 2px dashed #007bff; padding: 25px; border-radius: 8px; background: #f8faff; cursor: pointer; margin-bottom: 25px; position: relative; }
        .file-upload input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .upload-text { color: #007bff; font-weight: 600; }
        #file-name { margin-top: 8px; font-size: 13px; color: #333; font-style: italic; }
        button { background: #28a745; color: white; border: none; padding: 14px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #218838; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; font-weight: 600; font-size: 14px; text-align: left; background: #f8f9fa; padding: 12px; border-radius: 6px; display: none; }
        .success { color: #28a745; border-left: 4px solid #28a745; }
        .error { color: #dc3545; border-left: 4px solid #dc3545; }
        .process { color: #ffc107; border-left: 4px solid #ffc107; }
    </style>
</head>
<body>

<div class="card">
    <h1>Точечная очистка фонов PDF</h1>
    <p>Удаляет только подложку 539x786. Текст, линии чертежей и таблицы остаются целыми.</p>
    
    <div class="file-upload">
        <span class="upload-text">Нажмите, чтобы выбрать PDF-файл</span>
        <input type="file" id="pdf-file" accept=".pdf" onchange="showFileName()">
        <div id="file-name"></div>
    </div>

    <button id="process-btn" onclick="processPdf()">Очистить фоны и скачать</button>

    <div id="status"></div>
</div>

<script>
    function showFileName() {
        const fileInput = document.getElementById('pdf-file');
        const nameDiv = document.getElementById('file-name');
        if (fileInput.files.length > 0) {
            nameDiv.innerText = `Выбран: ${fileInput.files[0].name}`;
        }
    }

    async function processPdf() {
        const fileInput = document.getElementById('pdf-file');
        const statusDiv = document.getElementById('status');
        const btn = document.getElementById('process-btn');

        if (!fileInput.files.length) {
            statusDiv.style.display = 'block';
            statusDiv.className = 'error';
            statusDiv.innerText = 'Пожалуйста, сначала выберите PDF файл.';
            return;
        }

        btn.disabled = true;
        statusDiv.style.display = 'block';
        statusDiv.className = 'process';
        statusDiv.innerText = 'Низкоуровневый поиск фоновых объектов...';

        try {
            const file = fileInput.files[0];
            const arrayBuffer = await file.arrayBuffer();
            
            // Загружаем документ
            const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
            
            // Получаем доступ ко всем внутренним объектам PDF напрямую (карта контекста)
            const indirectObjects = pdfDoc.context.indirectObjects;
            let removedCount = 0;

            console.log("--- Глубокое сканирование карты объектов ---");

            // Итерируемся по абсолютно всем скрытым объектам внутри PDF структуры
            for (const [ref, object] of indirectObjects.entries()) {
                // Ищем только объекты-словари, у которых тип подложки /Image или /Form
                if (object instanceof PDFLib.PDFRawStream || object instanceof PDFLib.PDFStream) {
                    const dict = object.dict;
                    
                    if (dict) {
                        const widthObj = dict.get(PDFLib.PDFName.of('Width'));
                        const heightObj = dict.get(PDFLib.PDFName.of('Height'));

                        if (widthObj instanceof PDFLib.PDFNumber && heightObj instanceof PDFLib.PDFNumber) {
                            const w = widthObj.value;
                            const h = heightObj.value;

                            // Сверяем с вашими точными физическими размерами картинки 539x786
                            if (w === 539 && h === 786) {
                                console.log(`Обнаружен скрытый фон: ID ${ref.objectNumber}, разрешение ${w}x${h}`);
                                
                                // Обнуляем данные потока (Stream). Картинка физически исчезает, 
                                // но структура документа и текстовые слои остаются абсолютно целыми.
                                object.contents = new Uint8Array(0); 
                                dict.set(PDFLib.PDFName.of('Length'), PDFLib.PDFNumber.of(0));
                                
                                removedCount++;
                            }
                        }
                    }
                }
            }

            if (removedCount === 0) {
                statusDiv.className = 'error';
                statusDiv.innerText = 'Целевые подложки размером 539x786 внутри карты объектов не найдены.';
                btn.disabled = false;
                return;
            }

            // Пересборка документа
            const pdfBytes = await pdfDoc.save();

            // Автоскачивание
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `cleared_perfect_${file.name}`;
            link.click();

            statusDiv.className = 'success';
            statusDiv.innerText = `Успешно! Из структуры PDF удалено объектов фонов: ${removedCount}. Текст и линии сохранены.`;

        } catch (error) {
            console.error(error);
            statusDiv.className = 'error';
            statusDiv.innerText = 'Ошибка при парсинге объектов. Возможно, файл зашифрован.';
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
