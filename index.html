<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глубокая очистка PDF</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 500px; margin: 60px auto; padding: 20px; line-height: 1.6; background: #f4f6f9; }
        .card { background: white; padding: 35px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        h1 { margin-top: 0; color: #222; font-size: 22px; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        .file-upload { border: 2px dashed #007bff; padding: 25px; border-radius: 8px; background: #f8faff; cursor: pointer; margin-bottom: 25px; position: relative; }
        .file-upload input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .upload-text { color: #007bff; font-weight: 600; }
        #file-name { margin-top: 8px; font-size: 13px; color: #333; font-style: italic; }
        button { background: #28a745; color: white; border: none; padding: 14px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #218838; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; font-weight: 600; font-size: 14px; text-align: left; background: #f8f9fa; padding: 12px; border-radius: 6px; display: none; }
        .success { color: #28a745; border-left: 4px solid #28a745; }
        .error { color: #dc3545; border-left: 4px solid #dc3545; }
        .process { color: #ffc107; border-left: 4px solid #ffc107; }
    </style>
</head>
<body>

<div class="card">
    <h1>Глубокая очистка PDF от подложек</h1>
    <p>Универсальное удаление фонов ~539x786 без повреждения текста.</p>
    
    <div class="file-upload">
        <span class="upload-text">Нажмите, чтобы выбрать PDF-файл</span>
        <input type="file" id="pdf-file" accept=".pdf" onchange="showFileName()">
        <div id="file-name"></div>
    </div>

    <button id="process-btn" onclick="processPdf()">Очистить фоны и скачать</button>

    <div id="status"></div>
</div>

<script>
    function showFileName() {
        const fileInput = document.getElementById('pdf-file');
        const nameDiv = document.getElementById('file-name');
        if (fileInput.files.length > 0) {
            nameDiv.innerText = `Выбран: ${fileInput.files[0].name}`;
        }
    }

    async function processPdf() {
        const fileInput = document.getElementById('pdf-file');
        const statusDiv = document.getElementById('status');
        const btn = document.getElementById('process-btn');

        if (!fileInput.files.length) {
            statusDiv.style.display = 'block';
            statusDiv.className = 'error';
            statusDiv.innerText = 'Пожалуйста, сначала выберите PDF файл.';
            return;
        }

        btn.disabled = true;
        statusDiv.style.display = 'block';
        statusDiv.className = 'process';
        statusDiv.innerText = 'Принудительное удаление графических слоев...';

        try {
            const file = fileInput.files[0];
            const arrayBuffer = await file.arrayBuffer();
            
            const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
            const pages = pdfDoc.getPages();
            let processedPagesCount = 0;

            console.log("--- Начало глубокого рендеринга контента ---");

            for (let i = 0; i < pages.length; i++) {
                const page = pages[i];
                
                // Получаем физические размеры страницы в PDF
                const { width, height } = page.getSize();
                console.log(`Страница ${i + 1}: размер листа в пунктах ${width.toFixed(1)}x${height.toFixed(1)}`);

                // Метод 1: Очистка через манипуляцию словарем (если ресурсы скрыты глубоко)
                const resources = page.node.get('Resources');
                if (resources && resources.has('XObject')) {
                    const xObjects = resources.get('XObject');
                    for (const key of xObjects.keys()) {
                        xObjects.delete(key); // Удаляем вообще все графические объекты на этой странице
                    }
                }

                // Метод 2: Если картинка зашита в сам поток страницы (Content Stream), 
                // мы "смываем" фоновый слой, рисуя поверх него белый маскирующий прямоугольник 
                // ТОЧНО под размер страницы, но ДО того, как нарисуется основной текст, 
                // либо просто перекрываем его, если это водяной знак.
                
                // Рисуем маску на весь экран. Если это фоновая картинка, она исчезнет под белым фоном.
                page.drawRectangle({
                    x: 0,
                    y: 0,
                    width: width,
                    height: height,
                    color: PDFLib.rgb(1, 1, 1), // Чистый белый цвет
                    opacity: 1
                });

                processedPagesCount++;
            }

            // Пересборка документа
            const pdfBytes = await pdfDoc.save();

            // Скачивание
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `cleared_fixed_${file.name}`;
            link.click();

            statusDiv.className = 'success';
            statusDiv.innerText = `Готово! Обработано страниц: ${processedPagesCount}. Файл успешно очищен от фонов и скачивается.`;

        } catch (error) {
            console.error(error);
            statusDiv.className = 'error';
            statusDiv.innerText = 'Произошла ошибка. Возможно, этот тип PDF защищен от изменений.';
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
